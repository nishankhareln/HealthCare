# Alembic configuration for the Samni Labs backend.
#
# SECURITY:
#   * `sqlalchemy.url` is DELIBERATELY left blank. The connection URL is
#     injected from application settings by alembic/env.py at runtime.
#     Credentials never live in this file and never get committed to git.
#   * `timezone = UTC` keeps migration timestamps unambiguous across
#     developer machines in different regions.
#   * `truncate_slug_length` caps the slug portion of migration filenames;
#     a pathological slug cannot blow up the versions directory.
#
# Invoke Alembic from the backend/ directory, e.g.:
#   alembic revision --autogenerate -m "initial schema"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]

# Path to migration scripts, relative to the directory Alembic is invoked from.
script_location = alembic

# Prepend the backend/ directory to sys.path so env.py can import
# `config`, `database`, and `db_models`.
prepend_sys_path = .

# Timestamped migration filenames keep history in chronological order and
# prevent two engineers from producing collidable filenames on the same day.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use UTC so timestamps embedded in filenames are unambiguous regardless of
# the developer's local clock.
timezone = UTC

# Cap slug length so a long `-m "..."` message cannot create an absurd filename.
truncate_slug_length = 40

# `os` => use the OS path separator; works correctly on Windows + Linux.
version_path_separator = os

# Write migration files as UTF-8 regardless of host locale.
output_encoding = utf-8

# Empty on purpose — env.py calls config.set_main_option("sqlalchemy.url", ...)
# with the value from config.Settings.DATABASE_URL_SYNC. Never populate here.
sqlalchemy.url =


# --------------------------------------------------------------------------- #
# Logging
# --------------------------------------------------------------------------- #
# Kept conservative so migrations don't flood stdout with SQL on a live RDS.
# The app's own logging is configured separately by config.configure_logging.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
# WARN hides routine connection/engine chatter; actual migration SQL is
# emitted by the alembic logger below.
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%dT%H:%M:%S%z
